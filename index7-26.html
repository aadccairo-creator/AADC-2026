<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خصائص وتحديات تدريب لاعبات المسافات</title>
    <script src="https://cdn.jsdelivr.net/npm/markmap-lib@0.18.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.18.12"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 1200px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        #markmap-container {
            width: 100%;
            height: 600px;
            background: #f8f9fa;
        }
        
        svg {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏃‍♀️ خصائص وتحديات تدريب لاعبات المسافات</h1>
            <p>خريطة ذهنية شاملة عن تدريب لاعبات المسافات الطويلة</p>
        </div>
        <div id="markmap-container"></div>
    </div>

    <script>
        const markdownContent = `# خصائص وتحديات تدريب لاعبات المسافات

## دور المدرب وأهمية العلوم
- عين الخبرة وتشخيص الأخطاء
- الإلمام بالبيوميكانيك والكيمياء الحيوية
- المدرب المبدع والمستقل
- فلسفة التدريب طويلة المدى

## الخصائص المورفولوجية والبيوميكانيكية
- زاوية كيو (Q-Angle)
  - أوسع عند الإناث (14-20 درجة)
  - الضغط على الرباط الصليبي
- تركيبة الحوض
  - أكثر اتساعاً وعمقاً للإنجاب
  - تأثير الذبذبات الحركية على الجري
  - مركز ثقل أخفض (توازن أفضل)
- الارتخاء الارتباطي للأربطة
- تغير التقنية خلال مراحل النمو

## التوازن العضلي وتمارين التصحيح
- منظومة العضلات (System)
  - تأثير الحوض على العمود الفقري
  - علاقة الأجونست والأنتاغونست
- العضلات الألوية (الجلوتوس)
  - الألوية الكبرى: المسؤولة عن الدفع
  - الألوية الوسطى: تثبيت الحوض
  - الألوية الصغرى: التدوير والتثبيت
- التمارين المقترحة
  - تمرين الصدفة (Clamshell)
  - هبوط الحوض (Pelvic Drop)
  - المشي الجانبي بشريط المقاومة
  - القرفصاء على رجل واحدة

## الخصائص الفسيولوجية والطاقة
- الجهاز الدوري
  - حجم القلب أصغر عند المرأة
  - معدل ضربات قلب أعلى للتعويض
  - نسبة هيموجلوبين أقل
- الألياف العضلية والتمثيل الغذائي
  - نسبة أعلى من الألياف البطيئة
  - الاعتماد الأكبر على حرق الدهون
  - توفير مخزون الجلايكوجين
  - تأخير التعب في المسافات الطويلة

## الدورة الشهرية والحديد
- مراحل الدورة الشهرية
  - فترة الطمث: تدريب خفيف
  - الطور الجريبي: تركيز على السرعة والشدة
  - الطور اللوتيني: تركيز على الحجم والتحمل
- أهمية الحديد
  - ناقل أساسي للأكسجين
  - مخازن الحديد (الفريتين والكبد)
  - المصادر (حيوانية سريعة ونباتية بطيئة)
  - تجنب الشاي والقهوة أثناء الوجبات

## متلازمة نقص الطاقة النسبية (RED-S)
- معادلة الطاقة المتاحة
- هرمية البقاء (توفير الطاقة للدماغ والقلب أولاً)
- مخاطر نقص الطاقة
  - توقف النظام الهرموني
  - ضعف ترميم العظام والكولاجين
  - كسور الإجهاد (Stress Fractures)
  - انهيار الصلابة الوترية العضلية
- مؤشر عتبة الإنذار (30 سعر/كجم)

## نصائح واستراتيجيات تدريبية
- النافذة الأيضية (الأكل خلال 30 دقيقة بعد التمرين)
- أهمية النوم قبل الساعة 10 (إعادة البناء)
- تجنب الشدة العالية على معدة فارغة
- مراقبة المؤشرات الميدانية (الدورة، النوم، التعب)
- توازن القوة والمرونة (الاستيسيتي والكونتراكتيليتي)`;

        // Parse markdown to markmap
        const { Markmap } = window;
        const { Transformer } = window;
        
        const transformer = new Transformer();
        const { root } = transformer.transform(markdownContent);
        
        const svg = document.querySelector('#markmap-container svg') || 
                    document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        
        if (!document.querySelector('#markmap-container svg')) {
            document.getElementById('markmap-container').appendChild(svg);
        }
        
        const mm = Markmap.create(svg, {}, root);
    </script>
</body>
</html>
